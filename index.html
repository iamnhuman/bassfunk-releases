<!doctype html>
<html class="is-page-loading">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    :root {
      --ui-font: "Google Sans Flex", sans-serif;
      --canvas-3d-sidebar-width: clamp(320px, 18vw, 360px);
      --canvas-3d-card-width: clamp(148px, 10.8vw, 176px);
      --canvas-3d-card-gap: clamp(14px, 1vw, 18px);
      --canvas-3d-card-height-offset: 32px;
    }
    @property --release-drift-x {
      syntax: "<length>";
      inherits: false;
      initial-value: 0px;
    }
    @property --release-drift-y {
      syntax: "<length>";
      inherits: false;
      initial-value: 0px;
    }
    @property --release-drift-rotate {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }
    @property --release-drift-scale {
      syntax: "<number>";
      inherits: false;
      initial-value: 1;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0 0 5px;
      background-color: #060606;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.028), rgba(255, 255, 255, 0.006)),
        radial-gradient(120% 180% at 0% 50%, rgba(255, 255, 255, 0.042), transparent 42%),
        radial-gradient(120% 180% at 100% 50%, rgba(255, 255, 255, 0.042), transparent 42%);
      background-position: 0 0;
    }
    html {
      scrollbar-gutter: auto;
    }
    body {
      position: relative;
      overflow-x: hidden;
      box-sizing: border-box;
      font-family: var(--ui-font);
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      height: 128px;
      pointer-events: none;
      z-index: 3;
    }
    body::before {
      top: 0;
      background: linear-gradient(180deg, rgba(6, 3, 1, 0.88), rgba(4, 4, 4, 0));
    }
    body::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(6, 3, 1, 0.88), rgba(4, 4, 4, 0));
    }
    body.is-page-loading {
      overflow: hidden;
    }
    .page-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 14% 50%, rgba(255, 32, 32, 0.18), transparent 30%),
        radial-gradient(circle at 86% 50%, rgba(117, 255, 84, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0.8)),
        #020303;
      background-size: 140% 160%, 140% 160%, 100% 100%, auto;
      opacity: 1;
      visibility: visible;
      animation: page-loader-field-shift 12s ease-in-out infinite alternate;
      transition:
        opacity 240ms ease,
        visibility 0s linear 240ms;
    }
    .page-loader::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.72) 0%, rgba(0, 0, 0, 0) 12%, rgba(0, 0, 0, 0) 88%, rgba(0, 0, 0, 0.72) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0) 16%, rgba(0, 0, 0, 0) 84%, rgba(0, 0, 0, 0.54));
      pointer-events: none;
    }
    .page-loader::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.045) 0,
          rgba(255, 255, 255, 0.045) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: 0.08;
      mix-blend-mode: screen;
      pointer-events: none;
      animation: page-loader-raster-drift 1.8s linear infinite;
    }
    .page-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .page-loader__hud {
      position: absolute;
      inset: 0;
      isolation: isolate;
      animation: page-loader-hud-drift 9s ease-in-out infinite;
      z-index: 0;
    }
    .page-loader__aurora {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .page-loader__aurora-blob {
      position: absolute;
      border-radius: 999px;
      filter: blur(48px);
      opacity: 0.78;
      mix-blend-mode: screen;
      will-change: transform, opacity;
    }
    .page-loader__aurora-blob--red {
      top: 18%;
      left: 8%;
      width: min(32vw, 360px);
      height: min(44vh, 420px);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 80, 66, 0.42), rgba(255, 37, 60, 0.16) 48%, transparent 76%);
      animation: page-loader-blob-red 10.5s cubic-bezier(0.22, 1, 0.36, 1) infinite alternate;
    }
    .page-loader__aurora-blob--green {
      top: 8%;
      right: 10%;
      width: min(28vw, 320px);
      height: min(48vh, 460px);
      background:
        radial-gradient(circle at 50% 50%, rgba(194, 255, 92, 0.36), rgba(118, 255, 62, 0.14) 46%, transparent 74%);
      animation: page-loader-blob-green 12.2s cubic-bezier(0.22, 1, 0.36, 1) infinite alternate;
    }
    .page-loader__aurora-blob--amber {
      bottom: 6%;
      left: 38%;
      width: min(30vw, 340px);
      height: min(36vh, 320px);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 182, 52, 0.28), rgba(163, 228, 58, 0.14) 52%, transparent 78%);
      animation: page-loader-blob-amber 8.6s cubic-bezier(0.22, 1, 0.36, 1) infinite alternate;
    }
    .page-loader__measure {
      position: absolute;
      top: 0;
      bottom: 0;
      left: clamp(16px, 2.6vw, 34px);
      width: clamp(58px, 6vw, 82px);
      color: #ff2347;
      z-index: 2;
    }
    .page-loader__measure::before {
      content: "";
      position: absolute;
      top: -4%;
      bottom: -4%;
      left: 32px;
      width: 3px;
      background:
        linear-gradient(180deg, rgba(255, 0, 56, 0.14), rgba(255, 19, 61, 0.9) 16%, rgba(255, 19, 61, 0.92) 84%, rgba(255, 0, 56, 0.14));
      box-shadow:
        0 0 12px rgba(255, 16, 64, 0.66),
        0 0 36px rgba(255, 16, 64, 0.3);
      animation: page-loader-measure-pulse 1.7s ease-in-out infinite;
    }
    .page-loader__measure::after {
      content: "";
      position: absolute;
      top: -4%;
      bottom: -4%;
      left: 0;
      width: 32px;
      background:
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 12px,
          rgba(255, 16, 64, 0.86) 12px,
          rgba(255, 16, 64, 0.86) 15px,
          transparent 15px,
          transparent 28px
        );
      opacity: 0.95;
      animation: page-loader-ticks-scroll 2.2s linear infinite;
    }
    .page-loader__measure-label {
      position: absolute;
      top: 8%;
      left: -4px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: rgba(255, 41, 72, 0.94);
      font-size: clamp(13px, 1.6vw, 18px);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 21, 61, 0.44);
      animation: page-loader-red-flicker 2.1s steps(2, end) infinite;
    }
    .page-loader__measure-zero,
    .page-loader__measure-minus {
      position: absolute;
      left: 0;
      color: rgba(255, 41, 72, 0.94);
      font-size: clamp(13px, 1.6vw, 18px);
      text-shadow: 0 0 10px rgba(255, 21, 61, 0.4);
      animation: page-loader-red-flicker 2.4s steps(2, end) infinite;
    }
    .page-loader__measure-zero {
      top: calc(50% - 22px);
    }
    .page-loader__measure-minus {
      bottom: 8%;
    }
    .page-loader__scanline {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 3px;
      background: rgba(255, 39, 64, 0.96);
      box-shadow:
        0 0 14px rgba(255, 39, 64, 0.72),
        0 0 36px rgba(255, 39, 64, 0.28);
      transform: translateY(-50%);
      animation: page-loader-scanline 2.9s ease-in-out infinite;
    }
    .page-loader__columns {
      position: absolute;
      inset: 0 clamp(22px, 4vw, 56px) 0 clamp(92px, 12vw, 160px);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: clamp(18px, 2vw, 40px);
      z-index: 2;
      animation: page-loader-columns-drift 8.8s ease-in-out infinite;
    }
    .page-loader__lane {
      position: relative;
      height: 100%;
      overflow: hidden;
      animation: page-loader-lane-shift 4.2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
    }
    .page-loader__lane::before {
      content: "";
      position: absolute;
      top: -8%;
      bottom: -8%;
      left: 50%;
      width: 4px;
      transform: translateX(-50%);
      background:
        linear-gradient(180deg, rgba(182, 255, 116, 0.12), rgba(164, 255, 92, 0.96) 10%, rgba(164, 255, 92, 0.96) 90%, rgba(182, 255, 116, 0.12));
      box-shadow:
        0 0 14px rgba(172, 255, 95, 0.86),
        0 0 40px rgba(126, 255, 98, 0.42);
      animation: page-loader-guide-glow 2.4s ease-in-out infinite;
    }
    .page-loader__beam {
      position: absolute;
      top: -10%;
      bottom: -10%;
      left: 50%;
      width: clamp(38px, 4vw, 78px);
      transform: translateX(-50%);
      background:
        linear-gradient(180deg, rgba(255, 137, 63, 0.88) 0%, rgba(215, 204, 51, 0.86) 34%, rgba(141, 220, 40, 0.88) 74%, rgba(92, 184, 16, 0.84) 100%);
      box-shadow:
        0 0 24px rgba(156, 255, 72, 0.18),
        inset 0 0 18px rgba(255, 255, 255, 0.08);
      animation: page-loader-beam-drift 3.6s cubic-bezier(0.22, 1, 0.36, 1) infinite;
    }
    .page-loader__tag {
      position: absolute;
      top: 13%;
      right: calc(50% - clamp(12px, 1vw, 18px));
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: rgba(255, 36, 67, 0.95);
      font-size: clamp(15px, 1.8vw, 22px);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 24, 58, 0.46);
      animation: page-loader-tag-flicker 1.9s steps(2, end) infinite;
    }
    .page-loader__index {
      position: absolute;
      top: calc(50% - 32px);
      right: calc(50% - clamp(22px, 1.6vw, 32px));
      color: rgba(255, 36, 67, 0.95);
      font-size: clamp(18px, 2vw, 28px);
      text-shadow: 0 0 12px rgba(255, 24, 58, 0.42);
      animation: page-loader-red-flicker 2.6s steps(2, end) infinite;
    }
    .page-loader__index--negative {
      top: auto;
      bottom: 8%;
    }
    .page-loader__caption {
      position: absolute;
      right: clamp(18px, 2.6vw, 34px);
      bottom: clamp(18px, 2.6vw, 32px);
      display: grid;
      gap: 4px;
      justify-items: end;
      color: rgba(255, 255, 255, 0.92);
      text-transform: uppercase;
      z-index: 2;
      animation: page-loader-caption-drift 4.8s ease-in-out infinite;
    }
    .page-loader__caption-label {
      font-size: clamp(12px, 1.3vw, 15px);
    }
    .page-loader__caption-state {
      color: rgba(178, 255, 115, 0.9);
      font-size: clamp(10px, 1vw, 12px);
      animation: page-loader-caption-pulse 1.4s ease-in-out infinite;
    }
    .page-loader__sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0 0 5px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .page-loader__lane:nth-child(2) .page-loader__beam {
      animation-delay: -0.7s;
    }
    .page-loader__lane:nth-child(3) .page-loader__beam {
      animation-delay: -1.4s;
    }
    .page-loader__lane:nth-child(4) .page-loader__beam {
      animation-delay: -2.1s;
    }
    .page-loader__lane:nth-child(5) .page-loader__beam {
      animation-delay: -2.8s;
    }
    .page-loader__lane:nth-child(2)::before {
      animation-delay: -0.3s;
    }
    .page-loader__lane:nth-child(3)::before {
      animation-delay: -0.6s;
    }
    .page-loader__lane:nth-child(4)::before {
      animation-delay: -0.9s;
    }
    .page-loader__lane:nth-child(5)::before {
      animation-delay: -1.2s;
    }
    .page-loader__lane:nth-child(2) {
      animation-delay: -0.4s;
    }
    .page-loader__lane:nth-child(3) {
      animation-delay: -0.8s;
    }
    .page-loader__lane:nth-child(4) {
      animation-delay: -1.2s;
    }
    .page-loader__lane:nth-child(5) {
      animation-delay: -1.6s;
    }
    .page-loader__lane:nth-child(2) .page-loader__tag,
    .page-loader__lane:nth-child(2) .page-loader__index,
    .page-loader__lane:nth-child(2) .page-loader__index--negative {
      animation-delay: -0.35s;
    }
    .page-loader__lane:nth-child(3) .page-loader__tag,
    .page-loader__lane:nth-child(3) .page-loader__index,
    .page-loader__lane:nth-child(3) .page-loader__index--negative {
      animation-delay: -0.7s;
    }
    .page-loader__lane:nth-child(4) .page-loader__tag,
    .page-loader__lane:nth-child(4) .page-loader__index,
    .page-loader__lane:nth-child(4) .page-loader__index--negative {
      animation-delay: -1.05s;
    }
    .page-loader__lane:nth-child(5) .page-loader__tag,
    .page-loader__lane:nth-child(5) .page-loader__index,
    .page-loader__lane:nth-child(5) .page-loader__index--negative {
      animation-delay: -1.4s;
    }
    @keyframes page-loader-raster-drift {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(4px);
      }
    }
    @keyframes page-loader-field-shift {
      0% {
        background-position: 0% 50%, 100% 46%, 0 0, 0 0;
      }
      100% {
        background-position: 7% 44%, 93% 54%, 0 0, 0 0;
      }
    }
    @keyframes page-loader-hud-drift {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0, -4px, 0);
      }
    }
    @keyframes page-loader-aurora-drift {
      0% {
        transform: translate3d(-4%, -2%, 0) scale(1);
      }
      100% {
        transform: translate3d(5%, 3%, 0) scale(1.08);
      }
    }
    @keyframes page-loader-aurora-sway {
      0%, 100% {
        transform: translate3d(-2%, 0, 0) scale(1);
        opacity: 0.56;
      }
      50% {
        transform: translate3d(3%, 2%, 0) scale(1.06);
        opacity: 0.84;
      }
    }
    @keyframes page-loader-scanline {
      0%, 100% {
        transform: translateY(calc(-50% - 36px)) scaleX(0.98);
        opacity: 0.72;
      }
      50% {
        transform: translateY(calc(-50% + 36px)) scaleX(1.01);
        opacity: 1;
      }
    }
    @keyframes page-loader-beam-drift {
      0%, 100% {
        transform: translateX(-50%) translateY(-28px) scaleY(1.08);
        opacity: 0.96;
      }
      50% {
        transform: translateX(-50%) translateY(20px) scaleY(0.92);
        opacity: 0.72;
      }
    }
    @keyframes page-loader-guide-glow {
      0%, 100% {
        opacity: 0.68;
        box-shadow:
          0 0 10px rgba(172, 255, 95, 0.72),
          0 0 28px rgba(126, 255, 98, 0.34);
      }
      50% {
        opacity: 1;
        box-shadow:
          0 0 18px rgba(172, 255, 95, 0.96),
          0 0 54px rgba(126, 255, 98, 0.56);
      }
    }
    @keyframes page-loader-lane-shift {
      0%, 100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(4px);
      }
    }
    @keyframes page-loader-columns-drift {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0, 8px, 0);
      }
    }
    @keyframes page-loader-measure-pulse {
      0%, 100% {
        opacity: 0.82;
        box-shadow:
          0 0 12px rgba(255, 16, 64, 0.66),
          0 0 36px rgba(255, 16, 64, 0.3);
      }
      50% {
        opacity: 1;
        box-shadow:
          0 0 18px rgba(255, 16, 64, 0.9),
          0 0 52px rgba(255, 16, 64, 0.42);
      }
    }
    @keyframes page-loader-ticks-scroll {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(28px);
      }
    }
    @keyframes page-loader-red-flicker {
      0%, 100% {
        opacity: 0.92;
      }
      20% {
        opacity: 0.58;
      }
      24% {
        opacity: 1;
      }
      60% {
        opacity: 0.78;
      }
      64% {
        opacity: 1;
      }
    }
    @keyframes page-loader-tag-flicker {
      0%, 100% {
        opacity: 0.9;
        transform: rotate(180deg) translateY(0);
      }
      35% {
        opacity: 0.62;
      }
      50% {
        opacity: 1;
        transform: rotate(180deg) translateY(-5px);
      }
      70% {
        opacity: 0.82;
      }
    }
    @keyframes page-loader-caption-pulse {
      0%, 100% {
        opacity: 0.78;
        text-shadow: 0 0 10px rgba(178, 255, 115, 0.18);
      }
      50% {
        opacity: 1;
        text-shadow: 0 0 18px rgba(178, 255, 115, 0.32);
      }
    }
    @keyframes page-loader-caption-drift {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0, -4px, 0);
      }
    }
    @keyframes page-loader-blob-red {
      0% {
        transform: translate3d(-5%, -4%, 0) scale(0.96);
        opacity: 0.66;
      }
      100% {
        transform: translate3d(8%, 5%, 0) scale(1.14);
        opacity: 0.9;
      }
    }
    @keyframes page-loader-blob-green {
      0% {
        transform: translate3d(4%, -6%, 0) scale(0.94);
        opacity: 0.62;
      }
      100% {
        transform: translate3d(-8%, 4%, 0) scale(1.16);
        opacity: 0.88;
      }
    }
    @keyframes page-loader-blob-amber {
      0% {
        transform: translate3d(-6%, 2%, 0) scale(0.92);
        opacity: 0.44;
      }
      100% {
        transform: translate3d(7%, -5%, 0) scale(1.12);
        opacity: 0.76;
      }
    }
    @keyframes releases-3d-backdrop-drift {
      0% {
        transform: translate3d(-2%, -1%, 0) scale(1);
      }
      100% {
        transform: translate3d(3%, 2%, 0) scale(1.08);
      }
    }
    @keyframes releases-3d-gradient-float {
      0% {
        transform: translate3d(-2%, 2%, 0) scale(1);
      }
      100% {
        transform: translate3d(2%, -2%, 0) scale(1.06);
      }
    }
    @media (max-width: 820px) {
      .page-loader__columns {
        inset: 0 18px 0 84px;
        gap: 12px;
      }
      .page-loader__beam {
        width: clamp(24px, 8vw, 44px);
      }
      .page-loader__tag {
        font-size: 12px;
      }
      .page-loader__index {
        font-size: 16px;
      }
      .page-loader__caption {
        left: 18px;
        right: 18px;
        justify-items: start;
      }
    }
    .page-loader.is-hidden .page-loader__hud {
      width: 100%;
      height: 100%;
      transition: transform 360ms ease, opacity 220ms ease;
      transform: scale(1.02);
      opacity: 0;
    }
    .page-loader__figure {
      position: relative;
      z-index: 1;
      width: min(280px, 72vw);
      height: auto;
      overflow: visible;
      pointer-events: none;
    }
    .page-loader__figure .main {
      fill: #fff;
      transform-box: fill-box;
      transform-origin: 140px 140px;
      animation: page-loader-pulse 2.5s ease-in-out infinite;
    }
    .page-loader__figure .sat {
      fill: #fff;
    }
    .page-loader__figure .sat-wrap {
      transform-box: fill-box;
      transform-origin: 140px 140px;
      will-change: transform;
      animation: page-loader-sat-fly 2.5s linear infinite;
      animation-fill-mode: both;
    }
    @keyframes page-loader-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes page-loader-sat-fly {
      0% {
        transform: translate3d(0, 0, 0) scale(0.72);
      }
      8% {
        transform: translate3d(6px, -5px, 0) scale(0.75);
      }
      16% {
        transform: translate3d(14px, -11px, 0) scale(0.8);
      }
      24% {
        transform: translate3d(24px, -18px, 0) scale(0.86);
      }
      32% {
        transform: translate3d(36px, -27px, 0) scale(0.92);
      }
      42% {
        transform: translate3d(50px, -38px, 0) scale(0.98);
      }
      52% {
        transform: translate3d(66px, -50px, 0) scale(1.04);
      }
      62% {
        transform: translate3d(78px, -60px, 0) scale(1.08);
      }
      72% {
        transform: translate3d(70px, -54px, 0) scale(1.04);
      }
      82% {
        transform: translate3d(46px, -34px, 0) scale(0.94);
      }
      92% {
        transform: translate3d(18px, -14px, 0) scale(0.8);

          sourceUrl: sourceUrl,
          sourceLabel: sourceLabel,
          provider: provider,
          audioUrl: '',
          releaseLinks: releaseLinks,
          socialLinks: []
        };
      }

      function getPlainReleaseDetail(index, sourceTile) {
        const resolvedIndex = resolvePlainReleaseIndex(index, sourceTile);
        if (!resolvedIndex) return null;
        return plainReleaseDetailsByIndex[resolvedIndex] || buildPlainReleaseFallbackDetail(resolvedIndex, sourceTile || getPlainReleaseTileByIndex(resolvedIndex));
      }

      function getPlainReleaseSourceText(detail) {
        const sourceLabel = detail && detail.sourceLabel ? detail.sourceLabel : '';
        if (sourceLabel === 'VK') return 'Open VK post';
        if (sourceLabel === 'Source') return 'Open source link';
        if (sourceLabel) return 'Open ' + sourceLabel + ' source';
        return 'Open source link';
      }

      function shouldRenderPlainReleaseSourceLink(detail) {
        if (!detail || !detail.sourceUrl) return false;
        const releaseLinks = Array.isArray(detail.releaseLinks) ? detail.releaseLinks : [];
        for (let i = 0; i < releaseLinks.length; i += 1) {
          const releaseLink = releaseLinks[i];
          if (releaseLink && releaseLink.url === detail.sourceUrl) return false;
        }
        return true;
      }

      function renderPlainReleaseLinks(detail) {
        if (!plainReleaseLinks) return;
        plainReleaseLinks.textContent = '';
        plainReleaseLinks.hidden = false;

        const fallbackLabel = detail ? getPlainReleaseProviderLabel(detail.provider) : '';
        const fallbackUrl = detail && (detail.releaseUrl || detail.sourceUrl) ? (detail.releaseUrl || detail.sourceUrl) : '';
        const releaseLinks = detail && Array.isArray(detail.releaseLinks) && detail.releaseLinks.length
          ? sortPlainReleaseLinks(detail.releaseLinks)
          : fallbackUrl
            ? sortPlainReleaseLinks([{ label: fallbackLabel || 'Release', url: fallbackUrl }])
            : [];

        if (!releaseLinks.length) {
          plainReleaseLinks.hidden = true;
          return;
        }

        for (let i = 0; i < releaseLinks.length; i += 1) {
          const releaseLink = releaseLinks[i];
          if (!releaseLink || !releaseLink.url) continue;
          const anchor = document.createElement('a');
          anchor.href = releaseLink.url;
          anchor.target = '_blank';
          anchor.rel = 'noreferrer';
          decoratePlainReleaseLinkAnchor(anchor, releaseLink, releaseLink.label || 'Release');
          plainReleaseLinks.appendChild(anchor);
        }
      }

      function extractSoundCloudArtistUrl(url) {
        try {
          const parsedUrl = new URL(url);
          if (parsedUrl.hostname.replace(/^www\./, '') !== 'soundcloud.com') return '';
          const segments = parsedUrl.pathname.split('/').filter(Boolean);
          if (!segments.length) return '';
          const blockedSegments = new Set(['discover', 'search', 'charts', 'stream', 'upload', 'you', 'settings', 'stations', 'genres', 'tags']);
          if (blockedSegments.has(segments[0])) return '';
          return parsedUrl.origin + '/' + segments[0];
        } catch {
          return '';
        }
      }

      function extractBandcampArtistUrl(url) {
        try {
          const parsedUrl = new URL(url);
          if (!/\.bandcamp\.com$/i.test(parsedUrl.hostname)) return '';
          return parsedUrl.origin + '/';
        } catch {
          return '';
        }
      }

      function normalizeText(value) {
        return String(value || '')
          .replace(/[\u200b-\u200d\ufeff]/g, '')
          .toLowerCase()
          .replace(/\s+/g, ' ')
          .trim();
      }

      function normalizeArtistSlug(value) {
        return normalizeText(value).replace(/[^a-z0-9]+/g, '');
      }

      function looksLikeArtistProfileUrl(url, providerName, artistName) {
        const artistSlug = normalizeArtistSlug(artistName);
        if (!url || !providerName || !artistSlug) return false;
        try {
          const parsedUrl = new URL(url);
          if (providerName === 'soundcloud') {
            if (parsedUrl.hostname.replace(/^www\./, '') !== 'soundcloud.com') return false;
            const handle = normalizeArtistSlug(parsedUrl.pathname.split('/').filter(Boolean)[0] || '');
            return !!handle && (handle.includes(artistSlug) || artistSlug.includes(handle));
          }
          if (providerName === 'bandcamp') {
            if (!/\.bandcamp\.com$/i.test(parsedUrl.hostname)) return false;
            const subdomain = normalizeArtistSlug(parsedUrl.hostname.replace(/\.bandcamp\.com$/i, ''));
            return !!subdomain && (subdomain.includes(artistSlug) || artistSlug.includes(subdomain));
          }
        } catch {
          return false;
        }
        return false;
      }

      const plainReleaseArtistLinkFallbacks = {
        'forest swords': [
          { label: 'SoundCloud', url: 'https://soundcloud.com/forestswords' }
        ]
      };

      function buildPlainReleaseArtistLinks(detail) {
        const links = [];
        const seen = new Set();
        const seenLabels = new Set();

        function pushArtistLink(label, url) {
          if (!label || !url) return;
          const normalizedLabel = label.toLowerCase();
          if (seenLabels.has(normalizedLabel)) return;
          const key = label.toLowerCase() + '|' + url;
          if (seen.has(key)) return;
          seen.add(key);
          seenLabels.add(normalizedLabel);
          links.push({ label: label, url: url });
        }

        const explicitLinks = detail && Array.isArray(detail.socialLinks) ? detail.socialLinks : [];
        for (let i = 0; i < explicitLinks.length; i += 1) {
          const socialLink = explicitLinks[i];
          if (!socialLink || !socialLink.url) continue;
          pushArtistLink(socialLink.label, socialLink.url);
        }

        const fallbackLinks = plainReleaseArtistLinkFallbacks[normalizeText(detail && detail.artistName)];
        if (fallbackLinks && fallbackLinks.length) {
          for (let i = 0; i < fallbackLinks.length; i += 1) {
            const fallbackLink = fallbackLinks[i];
            if (!fallbackLink || !fallbackLink.url) continue;
            pushArtistLink(fallbackLink.label, fallbackLink.url);
          }
        }

        return sortPlainReleaseLinks(links);
      }

      function renderPlainReleaseSocials(detail) {
        if (!plainReleaseSocials) return;
        plainReleaseSocials.textContent = '';

        const socialLinks = buildPlainReleaseArtistLinks(detail);
        if (plainReleaseMeta) plainReleaseMeta.hidden = !socialLinks.length;
        if (!socialLinks.length) return;

        for (let i = 0; i < socialLinks.length; i += 1) {
          const socialLink = socialLinks[i];
          const listItem = document.createElement('li');
          const anchor = document.createElement('a');
          anchor.href = socialLink.url;
          anchor.target = '_blank';
          anchor.rel = 'noreferrer';
          decoratePlainReleaseLinkAnchor(anchor, socialLink, socialLink.label);
          listItem.appendChild(anchor);
          plainReleaseSocials.appendChild(listItem);
        }
      }

      function fillPlainReleasePanel(detail, sourceTile) {
        if (!detail) return;
        const sourceImage = sourceTile ? sourceTile.querySelector('img') : null;
        const artworkSrc = sourceImage ? (sourceImage.currentSrc || sourceImage.src) : '';
        if (plainReleaseArtworkFrame) plainReleaseArtworkFrame.hidden = !artworkSrc;
        if (plainReleaseArtwork) {
          if (artworkSrc) plainReleaseArtwork.src = artworkSrc;
          plainReleaseArtwork.alt = detail.artistName + ' - ' + detail.releaseTitle;
        }
        if (plainReleaseArtist) plainReleaseArtist.textContent = detail.artistName;
        if (plainReleaseTitle) plainReleaseTitle.textContent = detail.releaseTitle;
        renderPlainReleaseLinks(detail);
        if (plainReleaseSourceLink) {
          plainReleaseSourceLink.href = detail.sourceUrl;
          plainReleaseSourceLink.textContent = getPlainReleaseSourceText(detail);
          plainReleaseSourceLink.hidden = !shouldRenderPlainReleaseSourceLink(detail);
        }
        if (plainReleaseSource) plainReleaseSource.hidden = false;
        renderPlainReleaseSocials(detail);
        schedulePlainReleaseNavigationLayout();
      }

      async function animatePlainReleaseSwitch(direction, onBeforeIncoming) {
        if (!plainReleaseContent || !plainReleaseContent.animate) {
          if (typeof onBeforeIncoming === 'function') onBeforeIncoming();
          await nextPlainReleaseFrame();
          return;
        }

        const outgoingAnimation = plainReleaseContent.animate(
          [
            {
              transform: 'translate3d(0, 0, 0) scale(1)',
              opacity: 1
            },
            {
              transform: 'translate3d(' + String(direction * -18) + 'px, 0, 0) scale(0.96)',
              opacity: 0
            }
          ],
          {
            duration: 180,
            easing: 'cubic-bezier(0.4, 0, 1, 1)',
            fill: 'forwards'
          }
        );

        await Promise.allSettled([outgoingAnimation.finished]);
        outgoingAnimation.cancel();
        plainReleaseContent.style.opacity = '0';
        plainReleaseContent.style.transform = 'translate3d(' + String(direction * 18) + 'px, 0, 0) scale(1.03)';
        if (typeof onBeforeIncoming === 'function') onBeforeIncoming();
        await nextPlainReleaseFrame();

        const incomingAnimation = plainReleaseContent.animate(
          [
            {
              transform: 'translate3d(' + String(direction * 18) + 'px, 0, 0) scale(1.03)',
              opacity: 0
            },
            {
              transform: 'translate3d(0, 0, 0) scale(1)',
              opacity: 1
            }
          ],
          {
            duration: 220,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            fill: 'forwards'
          }
        );

        await Promise.allSettled([incomingAnimation.finished]);
        incomingAnimation.cancel();
        plainReleaseContent.style.opacity = '';
        plainReleaseContent.style.transform = '';
      }

      async function navigatePlainRelease(offset) {
        if (!activePlainReleaseIndex || !plainReleasePanel || plainReleaseNavigationInFlight) return;
        const nextIndex = getPlainReleaseIndexOffset(activePlainReleaseIndex, offset);
        if (!nextIndex) return;

        const nextTile = getPlainReleaseTileByIndex(nextIndex);
        const nextDetail = getPlainReleaseDetail(nextIndex, nextTile);
        if (!nextDetail) return;

        plainReleaseNavigationInFlight = true;
        updatePlainReleaseNavigation();
        resetPlainReleaseTilt();

        const direction = offset > 0 ? 1 : -1;

        try {
          await animatePlainReleaseSwitch(direction, function () {
            activePlainReleaseIndex = nextIndex;
            setPlainReleaseSourceTile(nextTile);
            fillPlainReleasePanel(nextDetail, nextTile);
            updatePlainReleaseNavigation();
          });
        } finally {
          plainReleaseNavigationInFlight = false;
          updatePlainReleaseNavigation();
        }
      }

      async function animatePlainReleaseMorph(sourceTile, token) {
        if (!plainReleaseMorph || !plainReleaseMorphImage || !plainReleaseCard || !sourceTile || isCoarsePointer) return;

        const sourceImage = sourceTile.querySelector('img');
        const sourceRect = (sourceImage || sourceTile).getBoundingClientRect();
        if (!sourceRect.width || !sourceRect.height) return;

        await nextPlainReleaseFrame();
        const targetRect = plainReleaseArtworkFrame && !plainReleaseArtworkFrame.hidden
          ? plainReleaseArtworkFrame.getBoundingClientRect()
          : plainReleaseCard.getBoundingClientRect();
        if (!targetRect.width || !targetRect.height) return;

        plainReleaseMorph.classList.add('is-active');
        plainReleaseMorph.style.left = sourceRect.left + 'px';
        plainReleaseMorph.style.top = sourceRect.top + 'px';
        plainReleaseMorph.style.width = sourceRect.width + 'px';
        plainReleaseMorph.style.height = sourceRect.height + 'px';
        plainReleaseMorph.style.borderRadius = '10px';
        plainReleaseMorph.style.transform = 'translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg)';
        plainReleaseMorph.style.opacity = '1';
        plainReleaseMorphImage.src = sourceImage ? (sourceImage.currentSrc || sourceImage.src) : '';

        const duration = 620;
        const revealDelay = 230;
        plainReleaseRevealTimer = window.setTimeout(function () {
          if (plainReleaseAnimationToken !== token || !plainReleasePanel) return;
          plainReleasePanel.classList.remove('is-morphing');
        }, revealDelay);

        if (!plainReleaseMorph.animate) {
          await new Promise(function (resolve) {
            window.setTimeout(resolve, duration);
          });
          return;
        }

        const morphAnimation = plainReleaseMorph.animate(
          [
            {
              left: sourceRect.left + 'px',
              top: sourceRect.top + 'px',
              width: sourceRect.width + 'px',
              height: sourceRect.height + 'px',
              borderRadius: '10px',
              opacity: 1,
              transform: 'translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg)'
            },
            {
              offset: 0.72,
              left: targetRect.left + 'px',
              top: targetRect.top + 'px',
              width: targetRect.width + 'px',
              height: targetRect.height + 'px',
              borderRadius: '18px',
              opacity: 1,
              transform: 'translate3d(0, 0, 80px) rotateX(7deg) rotateY(-12deg)'
            },
            {
              left: targetRect.left + 'px',
              top: targetRect.top + 'px',
              width: targetRect.width + 'px',
              height: targetRect.height + 'px',
              borderRadius: '18px',
              opacity: 0,
              transform: 'translate3d(0, 0, 120px) rotateX(12deg) rotateY(-18deg)'
            }
          ],
          {
            duration: duration,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            fill: 'forwards'
          }
        );

        const imageAnimation = plainReleaseMorphImage.animate(
          [
            { transform: 'scale(1)', filter: 'brightness(1) saturate(1)', opacity: 1 },
            { transform: 'scale(1.14)', filter: 'brightness(0.72) saturate(0.9)', opacity: 1 }
          ],
          {
            duration: duration,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            fill: 'forwards'
          }
        );

        const overlayAnimation = plainReleaseMorphOverlay
          ? plainReleaseMorphOverlay.animate(
            [
              { opacity: 0, offset: 0 },
              { opacity: 0.12, offset: 0.28 },
              { opacity: 0.5, offset: 0.72 },
              { opacity: 0.9, offset: 1 }
            ],
            {
              duration: duration,
              easing: 'linear',
              fill: 'forwards'
            }
          )
          : null;

        const animationPromises = [morphAnimation.finished, imageAnimation.finished];
        if (overlayAnimation) animationPromises.push(overlayAnimation.finished);
        await Promise.allSettled(animationPromises);
      }

      async function openPlainReleasePanel(index, sourceTile) {
        const resolvedIndex = resolvePlainReleaseIndex(index, sourceTile);
        const detail = getPlainReleaseDetail(resolvedIndex, sourceTile);
        if (!detail || !plainReleasePanel) return;
        setReleasePanelOpenState(true);
        const token = plainReleaseAnimationToken + 1;
        plainReleaseAnimationToken = token;
        stopPlainReleaseMorph();
        clearPlainReleaseSourceTile();
        activePlainReleaseIndex = resolvedIndex;
        setPlainReleaseSourceTile(sourceTile);
        fillPlainReleasePanel(detail, sourceTile);
        updatePlainReleaseNavigation();
        plainReleasePanel.hidden = false;
        plainReleasePanel.classList.add('is-open');
        plainReleasePanel.classList.add('is-morphing');
        plainReleasePanel.setAttribute('aria-hidden', 'false');
        resetPlainReleaseTilt();
        await animatePlainReleaseMorph(sourceTile, token);
        if (plainReleaseAnimationToken !== token) return;
        plainReleasePanel.classList.remove('is-morphing');
        schedulePlainReleaseNavigationLayout();
        stopPlainReleaseMorph();
      }

      function updateClothReleaseStatus(message, isError) {
        if (!clothReleaseStatus) return;
        clothReleaseStatus.hidden = !message;
        clothReleaseStatus.classList.toggle('is-error', !!isError);
        if (message) clothReleaseStatus.textContent = message;
      }

      function formatFooterTime(seconds) {
        const total = Math.max(0, Math.floor(Number.isFinite(seconds) ? seconds : 0));
        const minutes = Math.floor(total / 60);
        const remaining = total % 60;
        return String(minutes) + ':' + String(remaining).padStart(2, '0');
      }

      function stopClothReleaseFooterLoop() {
        if (clothReleaseFooterRafId) {
          window.cancelAnimationFrame(clothReleaseFooterRafId);
          clothReleaseFooterRafId = 0;
        }
      }

      function updateClothReleaseFooter() {
        if (!clothReleaseFooter) return;
        const snapshot = clothReleaseExperience && typeof clothReleaseExperience.getAudioSnapshot === 'function'
          ? clothReleaseExperience.getAudioSnapshot()
          : null;
        const isVisible = !!(clothReleasePanel && clothReleasePanel.classList.contains('is-open') && !clothReleasePanel.hidden);
        clothReleaseFooter.hidden = !isVisible;
        clothReleaseFooter.setAttribute('aria-hidden', isVisible ? 'false' : 'true');
        clothReleaseFooter.classList.toggle('is-visible', isVisible);
        if (!isVisible) {
          stopClothReleaseFooterLoop();
          return;
        }
        const currentTime = snapshot ? snapshot.currentTime : 0;
        const duration = snapshot ? snapshot.duration : 0;
        if (clothFooterPlay) {
          setClothFooterButtonIcon(clothFooterPlay, 'play', !!(snapshot && snapshot.isPlaying));
          clothFooterPlay.setAttribute('aria-label', snapshot && snapshot.isPlaying ? 'Pause' : 'Play');
        }
        if (clothFooterVolume) {
          setClothFooterButtonIcon(clothFooterVolume, 'volume', !!(snapshot && snapshot.volumePanelOpen));
          clothFooterVolume.setAttribute('aria-label', snapshot && snapshot.volumePanelOpen ? 'Hide volume panel' : 'Show volume panel');
        }
        if (clothFooterVolumePanel) {
          const volumePanelVisible = !!(snapshot && snapshot.volumePanelOpen);
          clothFooterVolumePanel.hidden = !volumePanelVisible;
          clothFooterVolumePanel.classList.toggle('is-visible', volumePanelVisible);
        }
        if (clothFooterVolumeSlider) {
          clothFooterVolumeSlider.value = String(snapshot ? snapshot.volume : 0);
        }
        if (clothFooterPrev) {
          clothFooterPrev.disabled = !getPlainReleaseIndexOffset(activeClothReleaseIndex, -1);
        }
        if (clothFooterNext) {
          clothFooterNext.disabled = !getPlainReleaseIndexOffset(activeClothReleaseIndex, 1);
        }
      if (clothFooterTime) {
        clothFooterTime.textContent = formatFooterTime(currentTime) + ' / ' + formatFooterTime(duration);
      }
      if (clothFooterTimeStart) {
        clothFooterTimeStart.textContent = formatFooterTime(currentTime);
      }
      if (clothFooterTimeEnd) {
        clothFooterTimeEnd.textContent = formatFooterTime(duration);
      }
      if (clothFooterProgressFill) {
        const progress = duration > 0 ? Math.max(0, Math.min(1, currentTime / duration)) : 0;
        clothFooterProgressFill.style.width = (progress * 100).toFixed(2) + '%';
      }
        if (clothFooterPage) {
          clothFooterPage.textContent = activeClothReleaseIndex ? ('#' + String(activeClothReleaseIndex).padStart(3, '0')) : '---';
        }
        if (!clothReleaseFooterRafId) {
          clothReleaseFooterRafId = window.requestAnimationFrame(function tickFooter() {
            clothReleaseFooterRafId = 0;
            if (!clothReleasePanel || !clothReleasePanel.classList.contains('is-open')) {
              stopClothReleaseFooterLoop();
              return;
            }
            updateClothReleaseFooter();
          });
        }
      }

      function setClothReleaseProgressFromClientX(clientX) {
        if (!clothReleaseExperience || typeof clothReleaseExperience.setAudioProgress !== 'function' || !clothFooterProgress) return false;
        const rect = clothFooterProgress.getBoundingClientRect();
        if (!rect.width) return false;
        const progress = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        clothReleaseExperience.setAudioProgress(progress);
        updateClothReleaseFooter();
        return true;
      }

      function buildReleaseLinksForPanel(detail) {
        const fallbackLabel = detail ? getPlainReleaseProviderLabel(detail.provider) : '';
        const fallbackUrl = detail && (detail.releaseUrl || detail.sourceUrl) ? (detail.releaseUrl || detail.sourceUrl) : '';
        return detail && Array.isArray(detail.releaseLinks) && detail.releaseLinks.length
          ? sortPlainReleaseLinks(detail.releaseLinks)
          : fallbackUrl
            ? sortPlainReleaseLinks([{ label: fallbackLabel || 'Release', url: fallbackUrl }])
            : [];
      }

      function isPlainReleaseDirectAudioUrl(url) {
        if (!url) return false;
        try {
          const parsedUrl = new URL(url);
          const pathname = parsedUrl.pathname.toLowerCase();
          return /\.(mp3|wav|ogg|m4a|aac|flac)(?:$|\?)/i.test(pathname) || parsedUrl.hostname.replace(/^www\./, '').endsWith('dropbox.com');
        } catch {
          return false;
        }
      }

      function normalizePlainReleaseAudioUrl(url) {
        if (!url) return '';
        try {
          const parsedUrl = new URL(url);
          const host = parsedUrl.hostname.replace(/^www\./, '').toLowerCase();
          if (host.endsWith('dropbox.com')) {
            parsedUrl.searchParams.set('raw', '1');
          }
          return parsedUrl.toString();
        } catch {
          return String(url || '').trim();
        }
      }

      function getPlainReleaseAudioUrl(detail, index, sourceTile) {
        const resolvedIndex = resolvePlainReleaseIndex(index, sourceTile);
        if (resolvedIndex && plainReleaseAssignedAudioByIndex[resolvedIndex]) {
          return normalizePlainReleaseAudioUrl(plainReleaseAssignedAudioByIndex[resolvedIndex]);
        }
        if (!detail) return '';
        const candidates = [];
        if (detail.sourceUrl) candidates.push(detail.sourceUrl);
        if (Array.isArray(detail.releaseLinks)) {
          for (let i = 0; i < detail.releaseLinks.length; i += 1) {
            const releaseLink = detail.releaseLinks[i];
            if (releaseLink && releaseLink.url) candidates.push(releaseLink.url);
          }
        }
        for (let i = 0; i < candidates.length; i += 1) {
          if (isPlainReleaseDirectAudioUrl(candidates[i])) {
            return normalizePlainReleaseAudioUrl(candidates[i]);
          }
        }
        return '';
      }

      function renderClothReleaseLinkGroup(container, links) {
        if (!container) return;
        container.textContent = '';
        if (!Array.isArray(links) || !links.length) return;
        for (let i = 0; i < links.length; i += 1) {
          const link = links[i];
          if (!link || !link.url) continue;
          const anchor = document.createElement('a');
          anchor.href = link.url;
          anchor.target = '_blank';
          anchor.rel = 'noreferrer';
          decoratePlainReleaseLinkAnchor(anchor, link, link.label);
          container.appendChild(anchor);
        }
      }

      function renderClothReleaseLinks(detail) {
        renderClothReleaseLinkGroup(clothFooterReleaseLinks, sortPlainReleaseLinks(buildReleaseLinksForPanel(detail)));
        renderClothReleaseLinkGroup(clothFooterArtistLinks, sortPlainReleaseLinks(buildPlainReleaseArtistLinks(detail)));
      }

      function buildClothReleaseCardPayload(detail, sourceTile) {
        const sourceImage = sourceTile ? sourceTile.querySelector('img') : null;
        const sourceImageSrc = sourceImage
          ? normalizePlainReleaseAssetUrl(sourceImage.currentSrc || sourceImage.src || (sourceImage.getAttribute ? (sourceImage.getAttribute('src') || '') : ''))
          : '';
        return {
          artistName: detail && detail.artistName ? detail.artistName : '',
          releaseTitle: detail && detail.releaseTitle ? detail.releaseTitle : '',
          artworkUrl: sourceImageSrc,
          artworkElement: sourceImage || null,
          audioUrl: getPlainReleaseAudioUrl(detail, activeClothReleaseIndex, sourceTile),
          socialLinks: buildPlainReleaseArtistLinks(detail).slice(0, 4),
          canGoPrev: !!getPlainReleaseIndexOffset(activeClothReleaseIndex, -1),
          canGoNext: !!getPlainReleaseIndexOffset(activeClothReleaseIndex, 1)
        };
      }

      function fillClothReleasePanel(detail) {
        if (!detail) return;
        if (clothReleaseArtist) clothReleaseArtist.textContent = detail.artistName || '';
        if (clothReleaseTitle) clothReleaseTitle.textContent = detail.releaseTitle;
        renderClothReleaseLinks(detail);
      }

      function updateClothReleaseNavigation() {
        if (clothFooterPrev) clothFooterPrev.disabled = !getPlainReleaseIndexOffset(activeClothReleaseIndex, -1);
        if (clothFooterNext) clothFooterNext.disabled = !getPlainReleaseIndexOffset(activeClothReleaseIndex, 1);
      }

      async function ensureClothReleaseExperience() {
        await ensureClothReleaseScriptLoaded();
        if (clothReleaseExperience) {
          clothReleaseExperience.resize();
          if (typeof clothReleaseExperience.prime === 'function') await clothReleaseExperience.prime();
          return clothReleaseExperience;
        }
        if (!window.BassfunkClothRelease || typeof window.BassfunkClothRelease.create !== 'function') {
          throw new Error('3D renderer is unavailable');
        }
        clothReleaseExperience = window.BassfunkClothRelease.create({
          viewport: clothReleaseViewport,
          status: clothReleaseStatus,
          footerOrbCanvas: clothFooterOrbCanvas,
          onClose: closeClothReleasePanel,
          onPrev: function () {
            navigateClothRelease(-1);
          },
          onNext: function () {
            navigateClothRelease(1);
          }
        });
        clothReleaseExperience.resize();
        if (typeof clothReleaseExperience.prime === 'function') await clothReleaseExperience.prime();
        return clothReleaseExperience;
      }

      function scheduleClothReleaseWarmup() {
        if (clothReleaseExperience || clothReleaseWarmupHandle) return;
        const warmup = function () {
          clothReleaseWarmupHandle = 0;
          if (viewMode !== '3d' || clothReleaseExperience) return;
          ensureClothReleaseExperience().catch(function (error) {
            console.error(error);
          });
        };
        if (typeof window.requestIdleCallback === 'function') {
          clothReleaseWarmupHandle = window.requestIdleCallback(warmup, { timeout: 1200 });
          return;
        }
        clothReleaseWarmupHandle = window.setTimeout(warmup, 180);
      }

      function scheduleRandomClothReleaseOpen() {
        const token = clothReleaseAutoOpenToken + 1;
        clothReleaseAutoOpenToken = token;
        window.requestAnimationFrame(async function () {
          if (clothReleaseAutoOpenToken !== token || viewMode !== '3d') return;
          const randomTile = getRandomPlainReleaseTileWithDetails();
          if (!randomTile) return;
          const randomIndex = randomTile.getAttribute('data-index') || '';
          if (!randomIndex) return;
          scrollPlainReleaseTileIntoView(randomTile);

        const settings = options || {};

        fillClothReleasePanel(detail);
        updateClothReleaseNavigation();
        updateClothReleaseStatus(panelWasOpen ? 'Loading 3D card...' : '', false);

        try {

          if (clothReleaseAnimationToken !== token) return;

      function hidePageLoader() {

        );
        const height = Math.max(

        );

      function sceneNeedsFullRebuild(previousViewport, nextViewport) {
        if (!previousViewport || !nextViewport) return true;
        if (Math.abs(nextViewport.width - previousViewport.width) >= SCENE_RESIZE_WIDTH_REBUILD_THRESHOLD) return true;
        if (Math.abs(nextViewport.height - previousViewport.height) >= SCENE_RESIZE_HEIGHT_REBUILD_THRESHOLD) return true;
        return false;

      function waitForReleaseImages() {
        if (!releaseImages.length) {
          hidePageLoader();

          pageLoaderForceHideTimer = window.setTimeout(function () {
            pageLoaderForceHideTimer = 0;
            hidePageLoader();

        function markImageReady() {
          pendingImages -= 1;

          window.requestAnimationFrame(function () {
            window.requestAnimationFrame(hidePageLoader);

            continue;

          img.addEventListener('load', markImageReady, { once: true });
          img.addEventListener('error', markImageReady, { once: true });

        const field = document.createElement('div');
        const coreSphere = document.createElement('div');
        space.className = 'canvas-space canvas-space--sphere';
        camera.className = 'canvas-camera';
        field.className = 'canvas-field';
        coreSphere.className = 'canvas-core-sphere';
        camera.appendChild(field);
        space.appendChild(coreSphere);
        space.appendChild(camera);
        canvasMode.prepend(space);

        const tileStates = [];
        const PERSPECTIVE = 1100;
        const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));
        const SIZE_TO_CANVAS_SCALE = { 4: 3.08, 3: 2.16, 2: 1.56, 1: 1.03 };
        const SIZE_TO_CANVAS_FILL = { 4: 1.0, 3: 0.95, 2: 0.88, 1: 0.77 };
        const SIZE_TO_CANVAS_ZOOM_BIAS = { 4: 500, 3: 280, 2: 140, 1: 40 };
        const SIZE_TO_CANVAS_NEAR_FACTOR = { 4: 0.52, 3: 0.42, 2: 0.3, 1: 0.18 };
        const SIZE_TO_CANVAS_NEAR_OFFSET = { 4: 10, 3: 26, 2: 48, 1: 110 };
        const SIZE_TO_CANVAS_NEAR_MIN = { 4: 220, 3: 190, 2: 165, 1: 130 };
        const SIZE_TO_CANVAS_OVERLAP = { 4: 0.68, 3: 0.58, 2: 0.72, 1: 0.7 };
        const SIZE_TO_CANVAS_RADIUS_MULTIPLIER = { 4: 1.54, 3: 1.2, 2: 1.08, 1: 1.02 };
        const SIZE_TO_CANVAS_ROTATION_JITTER = { 4: 0.34, 3: 0.5, 2: 0.72, 1: 0.86 };
        const SIZE_TO_CANVAS_HOVER_SCALE = { 4: 0.09, 3: 0.12, 2: 0.15, 1: 0.18 };
        const INITIAL_ZOOM_PULL = 52;
        const RAD_TO_DEG = 180 / Math.PI;
        const BUTTON_ZOOM_STEP = 320;
        const PINCH_ZOOM_FACTOR = 2.8;
        let tileSize = 58;
        let sphereRadius = 360;
        let currentCanvasSizeFactor = sizeFactor;
        let rotX = -14;
        let rotY = 18;
        let zoom = -920;
        let zoomNearLimit = -320;
        let zoomFarLimit = -5200;
        let targetRotX = rotX;
        let targetRotY = rotY;
        let targetZoom = zoom;
        let rafId = 0;
        let stopped = false;
        let isPaused = false;
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let activePointerId = null;
        let didDrag = false;
        let isRendering = false;
        let hoverNeedsRender = false;
        let motionNeedsRender = false;
        let motionTime = 0;
        let motionTimer = 0;
        let lastViewport = null;
        let prevRotX = rotX;
        let prevRotY = rotY;
        let spinFaceX = 0;
        let spinFaceY = 0;
        let pinchActive = false;
        let pinchStartDistance = 0;
        let pinchStartZoom = zoom;
        let hoverPointerX = 0;
        let hoverPointerY = 0;
        let hasHoverPointer = false;
        let suppressNextClick = false;
        const trackedPointers = new Map();

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function normalizeAngle(value) {
          let out = value % 360;
          if (out > 180) out -= 360;
          if (out < -180) out += 360;
          return out;
        }

        function snap(value) {
          return Math.round(value * 10) / 10;
        }

        function setTrackedPointer(event) {
          trackedPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        }

        function removeTrackedPointer(pointerId) {
          trackedPointers.delete(pointerId);
        }

        function getTrackedPointerPair() {
          if (trackedPointers.size < 2) return null;
          const pointers = Array.from(trackedPointers.values());
          return [pointers[0], pointers[1]];
        }

        function getPointerDistance(pair) {
          if (!pair) return 0;
          const dx = pair[0].x - pair[1].x;
          const dy = pair[0].y - pair[1].y;
          return Math.sqrt(dx * dx + dy * dy);
        }

        function trySetPointerCapture(pointerId) {
          if (!space.setPointerCapture || pointerId === null) return;
          try {
            space.setPointerCapture(pointerId);
          } catch (e) {}
        }

        function tryReleasePointerCapture(pointerId) {
          if (!space.releasePointerCapture || pointerId === null) return;
          try {
            space.releasePointerCapture(pointerId);
          } catch (e) {}
        }

        function sizeScaleForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_SCALE[nextSizeFactor] || 1;
        }

        function sizeFillForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_FILL[nextSizeFactor] || 1;
        }

        function sizeZoomBiasForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_ZOOM_BIAS[nextSizeFactor] || 0;
        }

        function sizeNearFactorForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_NEAR_FACTOR[nextSizeFactor] || 0.6;
        }

        function sizeNearOffsetForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_NEAR_OFFSET[nextSizeFactor] || 0;
        }

        function sizeNearMinForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_NEAR_MIN[nextSizeFactor] || 150;
        }

        function overlapLimitForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_OVERLAP[nextSizeFactor] || 0.8;
        }

        function radiusMultiplierForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_RADIUS_MULTIPLIER[nextSizeFactor] || 1;
        }

        function rotationJitterForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_ROTATION_JITTER[nextSizeFactor] || 1;
        }

        function hoverScaleForCanvas(nextSizeFactor) {
          return SIZE_TO_CANVAS_HOVER_SCALE[nextSizeFactor] || 0.16;
        }

        function startPinchGesture() {
          const pair = getTrackedPointerPair();
          if (!pair) return false;
          pinchActive = true;
          pinchStartDistance = Math.max(1, getPointerDistance(pair));
          pinchStartZoom = targetZoom;
          didDrag = true;
          endDrag(activePointerId);
          return true;
        }

        function stopPinchGesture() {
          pinchActive = false;
          pinchStartDistance = 0;
          pinchStartZoom = targetZoom;
        }

        function updatePinchGesture() {
          const pair = getTrackedPointerPair();
          if (!pair) return false;
          const distance = Math.max(1, getPointerDistance(pair));
          targetZoom = clamp(
            pinchStartZoom + (distance - pinchStartDistance) * PINCH_ZOOM_FACTOR,
            zoomFarLimit,
            zoomNearLimit
          );
          ensureRender();
          return true;
        }

        function updateCamera() {
          camera.style.transform = 'translateZ(' + zoom.toFixed(2) + 'px) rotateX(' + rotX.toFixed(2) + 'deg) rotateY(' + rotY.toFixed(2) + 'deg)';
          updateCoreSphere();
        }

        function ensureRender() {
          if (stopped || isPaused || isRendering) return;
          isRendering = true;
          rafId = window.requestAnimationFrame(frame);
        }

        function updateCoreSphere() {
          if (!coreSphere || !lastViewport) return;
          const projection = PERSPECTIVE / Math.max(1, PERSPECTIVE - zoom);
          const maxViewportDiameter = Math.min(lastViewport.width, lastViewport.height) * 0.42;
          const coreDiameter = clamp(sphereRadius * projection * 0.58, tileSize * 1.8, maxViewportDiameter);
          coreSphere.style.width = coreDiameter.toFixed(1) + 'px';
          coreSphere.style.height = coreDiameter.toFixed(1) + 'px';
        }

        function rotatePointX(x, y, z, angleDeg) {
          const angle = angleDeg * Math.PI / 180;
          const sin = Math.sin(angle);
          const cos = Math.cos(angle);
          return {
            x: x,
            y: y * cos - z * sin,
            z: y * sin + z * cos
          };
        }

        function rotatePointY(x, y, z, angleDeg) {
          const angle = angleDeg * Math.PI / 180;
          const sin = Math.sin(angle);
          const cos = Math.cos(angle);
          return {
            x: x * cos + z * sin,
            y: y,
            z: -x * sin + z * cos
          };
        }

        function normalizeSpherePoint(point, radius) {
          const length = Math.sqrt(point.x * point.x + point.y * point.y + point.z * point.z) || 1;
          const scale = radius / length;
          point.x *= scale;
          point.y *= scale;
          point.z *= scale;
        }

        function normalizeVector(vector) {
          const length = Math.sqrt(vector.x * vector.x + vector.y * vector.y + vector.z * vector.z) || 1;
          return {
            x: vector.x / length,
            y: vector.y / length,
            z: vector.z / length
          };
        }

        function dotVectors(left, right) {
          return left.x * right.x + left.y * right.y + left.z * right.z;
        }

        function crossVectors(left, right) {
          return {
            x: left.y * right.z - left.z * right.y,
            y: left.z * right.x - left.x * right.z,
            z: left.x * right.y - left.y * right.x
          };
        }

        function projectVectorOnPlane(vector, normal) {
          const dot = dotVectors(vector, normal);
          return {
            x: vector.x - normal.x * dot,
            y: vector.y - normal.y * dot,
            z: vector.z - normal.z * dot
          };
        }

        function relaxSpherePoints(points, minDistance, radius, iterations) {
          if (!points.length || !minDistance) return;
          for (let iteration = 0; iteration < iterations; iteration += 1) {
            let moved = false;
            for (let i = 0; i < points.length; i += 1) {
              const left = points[i];
              for (let j = i + 1; j < points.length; j += 1) {
                const right = points[j];
                let dx = right.x - left.x;
                let dy = right.y - left.y;
                let dz = right.z - left.z;
                let distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                if (!distance || distance >= minDistance) continue;
                moved = true;
                if (distance < 0.0001) {
                  dx = 0.0001;
                  dy = 0;
                  dz = 0;
                  distance = 0.0001;
                }
                const push = (minDistance - distance) * 0.5;
                const nx = dx / distance;
                const ny = dy / distance;
                const nz = dz / distance;
                left.x -= nx * push;
                left.y -= ny * push;
                left.z -= nz * push;
                right.x += nx * push;
                right.y += ny * push;
                right.z += nz * push;
              }
            }
            for (let i = 0; i < points.length; i += 1) {
              normalizeSpherePoint(points[i], radius);
            }
            if (!moved) break;
          }
        }

        function buildTiles() {
          field.innerHTML = '';
          tileStates.length = 0;
          hoverNeedsRender = true;
          motionNeedsRender = true;
          motionTime = 0;
          const viewport = getSceneViewportSize();
          const viewportWidth = viewport.width;
          const viewportHeight = viewport.height;
          lastViewport = viewport;
          const minViewport = Math.max(280, Math.min(viewportWidth, viewportHeight));
          const releaseCount = Math.max(1, tilesForCanvas.length);
          const sphereBase = minViewport * 0.54;
          const sphereBoost = Math.sqrt(releaseCount) * 3.2;
          sphereRadius = clamp((sphereBase + sphereBoost) * radiusMultiplierForCanvas(currentCanvasSizeFactor), 260, 1180);
          zoomNearLimit = -Math.max(
            sizeNearMinForCanvas(currentCanvasSizeFactor),
            sphereRadius * sizeNearFactorForCanvas(currentCanvasSizeFactor) - sizeNearOffsetForCanvas(currentCanvasSizeFactor)
          );
          zoomFarLimit = -Math.max(5200, sphereRadius * 7.6);
          const densitySize = minViewport / (Math.sqrt(releaseCount) * 1.18);
          const sphereArea = 4 * Math.PI * sphereRadius * sphereRadius;
          const surfaceSpacing = Math.sqrt(sphereArea / releaseCount);
          const overlapCappedMax = surfaceSpacing * overlapLimitForCanvas(currentCanvasSizeFactor);
          const requestedTileSize = densitySize * sizeScaleForCanvas(currentCanvasSizeFactor);
          tileSize = Math.round(clamp(Math.min(requestedTileSize, overlapCappedMax), 18, 220));
          updateCanvasTileSize(tileSize);
          const freeGap = Math.max(0, surfaceSpacing - tileSize);
          const radialJitterLimit = Math.min(tileSize * 0.06, freeGap * 0.16);
          const tangentJitterLimit = Math.min(tileSize * 0.05, freeGap * 0.14);
          const minimumCenterDistance = Math.min(
            surfaceSpacing * 0.995,
            tileSize + Math.max(18, freeGap * 1.04)
          );
          const motionBudget = Math.max(0.25, freeGap * 0.08);
          const sphereDiameter = sphereRadius * 2 + tileSize * 1.8;
          const fillFactor = sizeFillForCanvas(currentCanvasSizeFactor);
          const fitScaleW = (viewportWidth * fillFactor) / Math.max(1, sphereDiameter);
          const fitScaleH = (viewportHeight * Math.max(0.64, fillFactor - 0.11)) / Math.max(1, sphereDiameter);
          const fitScale = Math.min(fitScaleW, fitScaleH);
          const requiredDistance = fitScale < 1 ? (PERSPECTIVE * (1 / fitScale - 1)) : 0;
          const zoomBias = sizeZoomBiasForCanvas(currentCanvasSizeFactor);
          const fitDistance = requiredDistance + 430 - zoomBias;
          const fitZoom = -clamp(fitDistance - INITIAL_ZOOM_PULL, Math.abs(zoomNearLimit) + 8, Math.abs(zoomFarLimit));
          zoom = fitZoom;
          targetZoom = fitZoom;
          rotX = -6;
          rotY = 0;
          targetRotX = rotX;
          targetRotY = rotY;
          prevRotX = rotX;
          prevRotY = rotY;
          spinFaceX = 0;
          spinFaceY = 0;
          const preparedTiles = [];

          for (let i = 0; i < tilesForCanvas.length; i += 1) {
            const srcTile = tilesForCanvas[i];
            const img = srcTile.querySelector('img');
            if (!img) continue;
            const t = releaseCount === 1 ? 0.5 : i / (releaseCount - 1);
            const ny = 1 - t * 2;
            const ringRadius = Math.sqrt(Math.max(0, 1 - ny * ny));
            const theta = GOLDEN_ANGLE * i;
            const nx = Math.cos(theta) * ringRadius;
            const nz = Math.sin(theta) * ringRadius;
            const tangentX = -Math.sin(theta);
            const tangentY = 0;
            const tangentZ = Math.cos(theta);
            const bitangentX = ny * Math.cos(theta);
            const bitangentY = -ringRadius;
            const bitangentZ = ny * Math.sin(theta);
            const radialJitter = (Math.random() - 0.5) * radialJitterLimit;
            const tangentJitter = (Math.random() - 0.5) * tangentJitterLimit;
            const bitangentJitter = (Math.random() - 0.5) * tangentJitterLimit;
            const radiusWithJitter = sphereRadius + radialJitter;
            preparedTiles.push({
              srcTile: srcTile,
              img: img,
              x: nx * radiusWithJitter + tangentX * tangentJitter + bitangentX * bitangentJitter,
              y: ny * radiusWithJitter + tangentY * tangentJitter + bitangentY * bitangentJitter,
              z: nz * radiusWithJitter + tangentZ * tangentJitter + bitangentZ * bitangentJitter
            });
          }

          relaxSpherePoints(preparedTiles, minimumCenterDistance, sphereRadius, 16);

          const dynamicStep = Math.max(1, Math.floor(Math.max(1, preparedTiles.length) / 92));
          const rotationJitter = rotationJitterForCanvas(currentCanvasSizeFactor);

          for (let i = 0; i < preparedTiles.length; i += 1) {
            const preparedTile = preparedTiles[i];
            const srcTile = preparedTile.srcTile;
            const img = preparedTile.img;
            const baseX = preparedTile.x;
            const baseY = preparedTile.y;
            const baseZ = preparedTile.z;
          const tile = document.createElement('a');
          const tileIndex = srcTile.getAttribute('data-index') || '';
          tile.className = 'canvas-tile';
          tile.href = srcTile.getAttribute('href') || '#';
          tile.setAttribute('data-index', tileIndex);
          tile.target = '_blank';
          tile.rel = 'noreferrer noopener';
          tile.addEventListener('click', function (event) {
              if (didDrag || isDragging || pinchActive) {
                event.preventDefault();
                event.stopPropagation();
                return;
              }
              if (!tileIndex) return;
              event.preventDefault();
              event.stopPropagation();
              openPlainReleasePanel(tileIndex, tile);
            });
            mountCanvasTileImage(tile, img);
            field.appendChild(tile);
            const isDynamic = enableSceneIdleMotion && i % dynamicStep === 0;
            const state = {
              el: tile,
              baseX: baseX,
              baseY: baseY,
              baseZ: baseZ,
              rotX: (Math.random() - 0.5) * 8.6 * rotationJitter,
              rotY: (Math.random() - 0.5) * 9.2 * rotationJitter,
              rotZ: (Math.random() - 0.5) * 12.4 * rotationJitter,
              isDynamic: isDynamic,
              motionPhase: Math.random() * Math.PI * 2,
              motionSpeed: 0.48 + Math.random() * 0.45,
              motionAmpX: isDynamic ? Math.min(0.7 + Math.random() * 2.1, motionBudget) : 0,
              motionAmpY: isDynamic ? Math.min(0.5 + Math.random() * 1.4, motionBudget * 0.8) : 0,
              motionAmpZ: isDynamic ? Math.min(0.6 + Math.random() * 2.3, motionBudget) : 0,
              hover: 0,
              targetHover: 0,
              isPointerOver: false,
              pointerEnabled: true,
              depthRank: -1,
              screenAlpha: -1
            };
            tileStates.push(state);

            if (enableSceneHover) {
              tile.addEventListener('pointerenter', function () {
                state.targetHover = 1;
                state.isPointerOver = true;
                hoverNeedsRender = true;
                ensureRender();
              });
              tile.addEventListener('pointerleave', function () {
                state.targetHover = 0;
                state.isPointerOver = false;
                hoverNeedsRender = true;
                ensureRender();
              });
            }
          }
        }

        function renderTiles(forceAll) {
          let hoverAnimating = false;
          const radX = rotX * Math.PI / 180;
          const radY = rotY * Math.PI / 180;
          const sinX = Math.sin(radX);
          const cosX = Math.cos(radX);
          const sinY = Math.sin(radY);
          const cosY = Math.cos(radY);
          const hoverPullActive = hasHoverPointer && !isDragging && !pinchActive;
          const spaceRect = space.getBoundingClientRect();
          for (let i = 0; i < tileStates.length; i += 1) {
            const t = tileStates[i];
            const hoverDelta = t.targetHover - t.hover;
            t.hover += hoverDelta * 0.24;
            if (Math.abs(hoverDelta) > 0.002) hoverAnimating = true;
            const hoverActive = Math.abs(hoverDelta) > 0.002 || t.hover > 0.001;

            if (!forceAll && !hoverActive && !t.isDynamic) continue;

            let driftX = 0;
            let driftY = 0;
            let driftZ = 0;
            if (t.isDynamic && !t.isPointerOver && t.hover < 0.01 && t.targetHover < 0.01) {
              const p = motionTime * t.motionSpeed + t.motionPhase;
              driftX = Math.cos(p) * t.motionAmpX;
              driftY = Math.sin(p * 1.07) * t.motionAmpY;
              driftZ = Math.sin(p * 0.75) * t.motionAmpZ;
            }

            const hoverLift = t.hover * (tileSize * 0.34);
            const scale = 1 + t.hover * hoverScaleForCanvas(currentCanvasSizeFactor);
            const hoverRotX = 0;
            const hoverRotY = 0;
            let worldX = t.baseX + driftX;
            let worldY = t.baseY + driftY;
            let worldZ = t.baseZ + driftZ + hoverLift;
            if (hoverPullActive) {
              const xAfterY = worldX * cosY + worldZ * sinY;
              const zAfterY = -worldX * sinY + worldZ * cosY;
              const yCamera = worldY * cosX - zAfterY * sinX;
              const zCamera = worldY * sinX + zAfterY * cosX + zoom;
              const perspectiveDiv = Math.max(1, PERSPECTIVE - zCamera);
              const projection = PERSPECTIVE / perspectiveDiv;
              const projectedX = spaceRect.left + spaceRect.width * 0.5 + xAfterY * projection;
              const projectedY = spaceRect.top + spaceRect.height * 0.5 + yCamera * projection;
              const deltaX = hoverPointerX - projectedX;
              const deltaY = hoverPointerY - projectedY;
              const pullRadius = Math.max(260, tileSize * 5.2);
              const pullDistance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
              if (pullDistance < pullRadius) {
                const influence = Math.pow(1 - (pullDistance / pullRadius), 2);
                const safeDistance = pullDistance > 0.001 ? pullDistance : 1;
                const pull = clamp(0.06 + influence * 0.18 + t.hover * 0.08, 0.06, 0.28);
                worldX += (deltaX / safeDistance) * Math.min(24, tileSize * 0.16) * influence * pull;
                worldY += (deltaY / safeDistance) * Math.min(24, tileSize * 0.16) * influence * pull;
                worldZ += Math.min(28, tileSize * 0.12) * influence * (0.35 + t.hover * 0.25);
                if (!t.el.classList.contains('is-pointer-pull')) t.el.classList.add('is-pointer-pull');
              } else if (t.el.classList.contains('is-pointer-pull')) {
                t.el.classList.remove('is-pointer-pull');
              }
            } else if (t.el.classList.contains('is-pointer-pull')) {
              t.el.classList.remove('is-pointer-pull');
            }
            const horizontal = Math.max(0.0001, Math.sqrt(worldX * worldX + worldZ * worldZ));
            const sphereFaceY = Math.atan2(worldX, worldZ) * RAD_TO_DEG;
            const sphereFaceX = -Math.atan2(worldY, horizontal) * RAD_TO_DEG;
            const totalRotX = sphereFaceX + spinFaceX + t.rotX + hoverRotX;
            const totalRotY = sphereFaceY + spinFaceY + t.rotY + hoverRotY;
            const surfaceNormal = normalizeVector({ x: worldX, y: worldY, z: worldZ });
            const screenUp = { x: 0, y: -1, z: 0 };
            let desiredUp = projectVectorOnPlane(screenUp, surfaceNormal);
            const desiredUpLength = Math.sqrt(desiredUp.x * desiredUp.x + desiredUp.y * desiredUp.y + desiredUp.z * desiredUp.z);
            if (desiredUpLength < 0.0001) {
              desiredUp = projectVectorOnPlane({ x: 0, y: 0, z: 1 }, surfaceNormal);
            }
            desiredUp = normalizeVector(desiredUp);
            let currentUp = rotatePointX(0, -1, 0, totalRotX);
            currentUp = rotatePointY(currentUp.x, currentUp.y, currentUp.z, totalRotY);
            currentUp = normalizeVector(currentUp);
            const rollAxis = crossVectors(currentUp, desiredUp);
            const rollNumerator = dotVectors(rollAxis, surfaceNormal);
            const rollDenominator = Math.max(-1, Math.min(1, dotVectors(currentUp, desiredUp)));
            const rollCorrection = Math.atan2(rollNumerator, rollDenominator) * RAD_TO_DEG;

            // Compute depth in camera space using the same rotation basis as the sphere.
            const zAfterY = -worldX * sinY + worldZ * cosY;
            const zCamera = worldY * sinX + zAfterY * cosX;
            const depthAlpha = 1;
            const pointerEnabled = true;
            if (t.screenAlpha !== depthAlpha) {
              t.screenAlpha = depthAlpha;
              t.el.style.opacity = '1';
            }
            if (!t.pointerEnabled || t.el.style.pointerEvents !== 'auto') {
              t.pointerEnabled = pointerEnabled;
              t.el.style.pointerEvents = 'auto';
            }
            const depthRank = Math.round((zCamera + sphereRadius * 4 + 3000) * 1000) + i;
            if (depthRank !== t.depthRank) {
              t.depthRank = depthRank;
              t.el.style.zIndex = String(depthRank);
            }
            t.el.style.transform =
              'translate3d(' + snap(worldX).toFixed(1) + 'px,' +
              snap(worldY).toFixed(1) + 'px,' +
              snap(worldZ).toFixed(1) + 'px) ' +
              'rotateY(' + snap(totalRotY).toFixed(1) + 'deg) ' +
              'rotateX(' + snap(totalRotX).toFixed(1) + 'deg) ' +
              'rotateZ(' + snap(t.rotZ + rollCorrection).toFixed(1) + 'deg) ' +
              'scale(' + scale.toFixed(3) + ')';
          }
          return hoverAnimating;
        }

        function pickTileAt(clientX, clientY) {
          const hitElement = document.elementFromPoint(clientX, clientY);
          const hitTile = hitElement && hitElement.closest ? hitElement.closest('.canvas-tile') : null;
          if (hitTile) {
            for (let i = 0; i < tileStates.length; i += 1) {
              const mappedState = tileStates[i];
              if (mappedState.el !== hitTile) continue;
              if (mappedState.pointerEnabled && mappedState.screenAlpha > 0.34) {
                return mappedState;
              }
              break;
            }
          }
          let picked = null;
          for (let i = 0; i < tileStates.length; i += 1) {
            const t = tileStates[i];
            if (!t.pointerEnabled || t.screenAlpha <= 0.34) continue;
            const rect = t.el.getBoundingClientRect();
            if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) continue;
            if (!picked || t.depthRank > picked.depthRank) picked = t;
          }
          return picked;
        }

        function openTileLink(tileState) {
          if (!tileState || !tileState.el) return false;
          const tileIndex = tileState.el.getAttribute('data-index') || '';
          if (tileIndex) {
            openPlainReleasePanel(tileIndex, tileState.el);

      function createCardsScene() {
