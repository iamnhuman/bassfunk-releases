      function setSize(nextFactor, triggerButton) {
        suppressButtonHoverFill(triggerButton);
        if (triggerButton) compactSection = 'size';
        if (viewMode === 'sphere' && nextFactor !== 4 && nextFactor !== 2) return;
        sizeFactor = nextFactor;
        document.body.setAttribute('data-cards-size', String(sizeFactor));
        if (sizeX4Btn) sizeX4Btn.classList.toggle('is-active', sizeFactor === 4);
        if (sizeX3Btn) sizeX3Btn.classList.toggle('is-active', sizeFactor === 3);
        if (sizeX2Btn) sizeX2Btn.classList.toggle('is-active', sizeFactor === 2);
        if (sizeX1Btn) sizeX1Btn.classList.toggle('is-active', sizeFactor === 1);
        syncAllPillSliders();
        if (viewMode !== 'sphere' && viewMode !== 'cards') {
          updateGrid();
          if (viewMode === '3d' && releaseCanvasScene && typeof releaseCanvasScene.setSizeFactor === 'function') {
            releaseCanvasScene.setSizeFactor(sizeFactor);
          }
          return;
        }
        if (floatingScene && typeof floatingScene.setSizeFactor === 'function') {
          floatingScene.setSizeFactor(sizeFactor);
        }
      }

      if (sizeX4Btn) sizeX4Btn.addEventListener('click', function () { setSize(4, sizeX4Btn); });
      if (sizeX3Btn) sizeX3Btn.addEventListener('click', function () { setSize(3, sizeX3Btn); });
      if (sizeX2Btn) sizeX2Btn.addEventListener('click', function () { setSize(2, sizeX2Btn); });
      if (sizeX1Btn) sizeX1Btn.addEventListener('click', function () { setSize(1, sizeX1Btn); });
      if (compactTypeBtn) compactTypeBtn.addEventListener('click', function () { setCompactSection('type', compactTypeBtn); });
      if (compactViewBtn) compactViewBtn.addEventListener('click', function () { setCompactSection('view', compactViewBtn); });
      if (compactSizeBtn) compactSizeBtn.addEventListener('click', function () { setCompactSection('size', compactSizeBtn); });
      document.body.setAttribute('data-cards-size', String(sizeFactor));

      function applyInitialStateFromUrl() {
        if (!initialSearchParams || !initialSearchParams.toString()) return;
        const nextView = (initialSearchParams.get('view') || '').toLowerCase();
        const nextType = (initialSearchParams.get('type') || '').toLowerCase();
        const nextSize = Number(initialSearchParams.get('size') || '0');
        if (nextType === 'normal' || nextType === 'shuffle') setTypeMode(nextType);
        if (nextView === 'plain' || nextView === '3d' || nextView === 'cards' || nextView === 'sphere') setViewMode(nextView);
        if (nextSize >= 1 && nextSize <= 4) setSize(nextSize);
      }

      applyTypeOrder();
      updateTypeButtons();
      updateViewButtons();
      updateSizeControlsVisibility();
      refreshControlsLayout();
      scheduleControlsLayout();
      waitForReleaseImages();
      renderOrderedGrid();
      applyInitialStateFromUrl();
      maybeFinishControlsBootstrap();
      window.addEventListener('load', function () {
        controlsPageLoaded = true;
        scheduleControlsLayout();
        maybeFinishControlsBootstrap();
      });
      window.addEventListener('pageshow', function () {
        controlsPageLoaded = true;
        scheduleControlsLayout();
        maybeFinishControlsBootstrap();
      });
      if (document.fonts && typeof document.fonts.ready === 'object' && typeof document.fonts.ready.then === 'function') {
        document.fonts.ready.then(function () {
          controlsFontsLoaded = true;
          scheduleControlsLayout();
          maybeFinishControlsBootstrap();
        });
      }
      window.addEventListener('resize', function () {
        refreshControlsLayout();
        if (clothReleaseExperience) clothReleaseExperience.resize();
        if (viewMode === '3d' && releaseCanvasScene && typeof releaseCanvasScene.resize === 'function') {
          releaseCanvasScene.resize();
        }
        if (viewMode === 'sphere' || viewMode === 'cards') {
          if (floatingScene) floatingScene.resize();
          if (canvasModeBackdropEffect) canvasModeBackdropEffect.resize();
          return;
        }
        updateGrid();
      });
    })();
  </script>
</body>
</html>
